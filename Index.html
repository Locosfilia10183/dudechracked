<!DOCTYPE html>
<html>
<head>
    <title>DudeCracker V5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0a; color:#00ff41; font-family:'Courier New',monospace; padding:15px; }
        .container { max-width:900px; margin:0 auto; }
        .header { text-align:center; padding:15px; border-bottom:2px solid #00ff41; margin-bottom:20px; }
        .header h1 { font-size:1.8em; text-shadow:0 0 20px #00ff41; }
        .header .sub { color:#006600; font-size:0.8em; }
        .panel { background:rgba(0,20,0,0.9); border:1px solid #00ff41; border-radius:8px; padding:15px; margin-bottom:15px; }
        .panel-title { color:#00ff41; border-bottom:1px solid #003300; padding-bottom:8px; margin-bottom:12px; }
        .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:10px 0; }
        .stat-card { background:rgba(0,20,0,0.9); border:1px solid #003300; border-radius:6px; padding:12px; text-align:center; }
        .stat-card .value { font-size:2em; font-weight:bold; }
        .stat-card .label { color:#006600; font-size:0.6em; text-transform:uppercase; }
        .stat-card.good .value { color:#00ff88; }
        .stat-card.hits .value { color:#ffaa00; }
        .stat-card.bad .value { color:#ff4444; }
        textarea { width:100%; height:120px; padding:10px; background:#000; color:#00ff41; border:1px solid #003300; border-radius:4px; font-family:'Courier New',monospace; font-size:13px; }
        input { width:100%; padding:10px; background:#000; color:#00ff41; border:1px solid #003300; border-radius:4px; font-family:'Courier New',monospace; font-size:13px; }
        .btn { padding:10px 25px; background:#000; color:#00ff41; border:2px solid #00ff41; border-radius:4px; cursor:pointer; font-family:'Courier New',monospace; font-weight:bold; }
        .btn:hover { background:#00ff41; color:#000; }
        .btn-danger { border-color:#ff4444; color:#ff4444; }
        .btn-danger:hover { background:#ff4444; color:#000; }
        .btn-success { border-color:#00ff88; color:#00ff88; }
        .btn-success:hover { background:#00ff88; color:#000; }
        .flex { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
        .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-group .btn { flex:1; min-width:70px; }
        .log { height:150px; overflow-y:auto; background:#000; border:1px solid #003300; border-radius:4px; padding:8px; font-size:11px; margin-top:10px; }
        .log-entry { padding:2px 0; border-bottom:1px solid #001100; }
        .log-entry .valid { color:#00ff88; }
        .log-entry .bad { color:#ff4444; }
        .log-entry .info { color:#00aaff; }
        .progress-bar { width:100%; height:5px; background:#001100; border-radius:3px; margin:8px 0; overflow:hidden; }
        .progress-bar .fill { height:100%; background:#00ff41; width:0%; transition:width 0.5s; }
        .mode-btn { padding:6px 15px; background:#000; color:#006600; border:2px solid #003300; border-radius:4px; cursor:pointer; }
        .mode-btn.active { border-color:#00ff41; color:#00ff41; background:#001100; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⬡ DUDECRACKER V5</h1>
        <div class="sub">@DudeCrack // @DudeGeorge</div>
    </div>
    <div class="panel">
        <div class="panel-title">⚙️ CONFIG</div>
        <div class="flex">
            <button class="mode-btn active" onclick="setMode('checker')" id="modeChecker">📧 Mail Checker</button>
            <button class="mode-btn" onclick="setMode('inbox')" id="modeInbox">📨 Inbox Searcher</button>
        </div>
        <div id="keywordField" style="display:none; margin-top:10px;">
            <input type="text" id="keywordInput" placeholder="🔍 Keyword (z.B. TikTok, Instagram)">
        </div>
        <div style="margin-top:10px;">
            <textarea id="combolist" placeholder="email:passwort&#10;user@hotmail.com:password123"></textarea>
        </div>
        <div class="flex">
            <button class="btn" id="btnStart" onclick="startCheck()">▶ START</button>
            <button class="btn btn-danger" onclick="stopCheck()">⏹ STOP</button>
            <button class="btn btn-success" onclick="clearResults()">✕ CLEAR</button>
        </div>
    </div>
    <div class="panel">
        <div class="panel-title">📊 LIVE STATS</div>
        <div class="grid-3">
            <div class="stat-card good"><div class="value" id="statValid">0</div><div class="label">✅ Valid</div></div>
            <div class="stat-card hits"><div class="value" id="statHits">0</div><div class="label">🎯 Hits</div></div>
            <div class="stat-card bad"><div class="value" id="statBad">0</div><div class="label">❌ Bad</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.8em;color:#006600;">
            <span id="progressText">0%</span>
            <span id="doneText">0/0</span>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="log" id="logContainer">
            <div class="log-entry"><span class="info">▸ DudeCracker V5 Web gestartet...</span></div>
        </div>
    </div>
    <div class="panel">
        <div class="panel-title">📥 EXPORT</div>
        <div class="btn-group">
            <button class="btn" onclick="exportResults('valid')">📥 Valid</button>
            <button class="btn" onclick="exportResults('hits')">📥 Hits</button>
            <button class="btn btn-success" onclick="exportResults('all')">📥 All</button>
        </div>
    </div>
</div>
<script>
let mode = 'checker';
let checking = false;
function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
    document.getElementById('keywordField').style.display = m === 'inbox' ? 'block' : 'none';
    addLog('📌 Mode: ' + (m === 'checker' ? 'Mail Checker' : 'Inbox Searcher'), 'info');
}
function addLog(msg, type = 'info') {
    const c = document.getElementById('logContainer');
    const e = document.createElement('div');
    e.className = 'log-entry';
    const t = new Date().toLocaleTimeString();
    e.innerHTML = `<span style="color:#006600;">[${t}]</span> <span class="${type}">${msg}</span>`;
    c.appendChild(e);
    c.scrollTop = c.scrollHeight;
    if (c.children.length > 200) c.removeChild(c.firstChild);
}
async function startCheck() {
    const combolist = document.getElementById('combolist').value;
    const keyword = document.getElementById('keywordInput').value.trim();
    if (!combolist.trim()) { addLog('❌ Bitte Accounts eingeben!', 'bad'); return; }
    if (mode === 'inbox' && !keyword) { addLog('❌ Bitte Keyword eingeben!', 'bad'); return; }
    addLog('🚀 Starte Check...', 'info');
    try {
        const res = await fetch('/start', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({mode, keyword, combolist})
        });
        const data = await res.json();
        if (data.status === 'ok') {
            addLog('✅ ' + data.message, 'valid');
            checking = true;
            document.getElementById('btnStart').disabled = true;
            updateStatus();
        } else {
            addLog('❌ ' + data.message, 'bad');
        }
    } catch(e) { addLog('❌ Fehler: ' + e.message, 'bad'); }
}
async function stopCheck() {
    if (!confirm('Check stoppen?')) return;
    checking = false;
    await fetch('/stop', {method:'POST'});
    addLog('⏹️ Gestoppt!', 'info');
    document.getElementById('btnStart').disabled = false;
}
async function updateStatus() {
    if (!checking) { document.getElementById('btnStart').disabled = false; return; }
    try {
        const res = await fetch('/status');
        const d = await res.json();
        document.getElementById('statValid').textContent = d.stats?.valid || 0;
        document.getElementById('statHits').textContent = d.stats?.hits || 0;
        document.getElementById('statBad').textContent = d.stats?.bad || 0;
        document.getElementById('doneText').textContent = (d.stats?.done || 0) + '/' + (d.stats?.total || 0);
        const p = d.progress || 0;
        document.getElementById('progressFill').style.width = p + '%';
        document.getElementById('progressText').textContent = p + '%';
        if (d.results && d.results.length > 0) {
            const last = d.results[d.results.length - 1];
            const status = last.valid ? '✅ VALID' : '❌ BAD';
            const hits = last.hits > 0 ? ' 🎯 ' + last.hits + ' Treffer' : '';
            addLog(`${last.email} → ${status}${hits}`, last.valid ? 'valid' : 'bad');
        }
        if (d.checking) {
            checking = true;
            document.getElementById('btnStart').disabled = true;
            setTimeout(updateStatus, 500);
        } else {
            checking = false;
            document.getElementById('btnStart').disabled = false;
            addLog('✅ CHECK ABGESCHLOSSEN!', 'info');
        }
    } catch(e) { setTimeout(updateStatus, 1000); }
}
async function clearResults() {
    if (!confirm('Alle Ergebnisse löschen?')) return;
    await fetch('/clear', {method:'POST'});
    document.getElementById('logContainer').innerHTML = '';
    addLog('🧹 Gelöscht', 'info');
    document.getElementById('statValid').textContent = '0';
    document.getElementById('statHits').textContent = '0';
    document.getElementById('statBad').textContent = '0';
    document.getElementById('doneText').textContent = '0/0';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressText').textContent = '0%';
}
function exportResults(type) {
    window.open('/export/' + type, '_blank');
}
document.getElementById('keywordInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startCheck();
});
addLog('💡 DudeCracker V5 Web bereit!', 'info');
</script>
</body>
</html>
